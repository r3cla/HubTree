name: Deploy redirect to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Create redirect page
        run: |
          mkdir out
          cat > out/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta http-equiv="refresh" content="3;url=https://hubtree.pages.dev/" />
            <title>HubTree — Moved</title>
            <style>
              body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #111827;
                font-family: sans-serif;
                color: #9ca3af;
              }
              a {
                color: #60a5fa;
                text-decoration: none;
              }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <div style="text-align:center">
              <p style="font-size:1.1rem">HubTree has moved.</p>
              <p>Redirecting to <a href="https://hubtree.pages.dev/">hubtree.pages.dev</a>…</p>
            </div>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
